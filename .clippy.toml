# Clippy configuration for TaskFlow
# See: https://doc.rust-lang.org/clippy/lint_configuration.html

# Maximum cognitive complexity before warning
cognitive-complexity-threshold = 30

# Maximum number of lines in a function before warning
too-many-lines-threshold = 200

# Maximum number of arguments before warning
too-many-arguments-threshold = 8

# Maximum number of bool fields in a struct before warning
max-struct-bools = 8

# Types that are allowed to be used with `expect`
allow-expect-in-tests = true

# Types that are allowed to be used with `unwrap`
allow-unwrap-in-tests = true

# MSRV for compatibility lints
# Uses LazyLock (1.80), is_none_or (1.82), const Vec methods (1.87)
msrv = "1.87.0"

# Maximum bytes for stack-allocated arrays before warning.
# Default (16 KiB) produces a false-positive in clippy 0.1.93 where the
# span is not resolved, pointing to this file instead of the actual site.
# Raised to 512 KiB (the historical clippy default) to suppress it.
array-size-threshold = 524288
